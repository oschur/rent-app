basePath: /
definitions:
  internal_handler_apartment.CreateApartmentRequest:
    properties:
      address:
        type: string
      area_m2:
        type: integer
      city:
        type: string
      country:
        type: string
      floor:
        type: integer
      pets_allowed:
        type: boolean
      price:
        type: integer
      price_unit:
        description: '"pernight", "permonth"'
        type: string
      rooms:
        type: integer
      status:
        description: '"active", "archived", "blocked"'
        type: string
      title:
        type: string
      total_floors:
        type: integer
    type: object
  internal_handler_apartment.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_handler_apartment.UpdateApartmentRequest:
    properties:
      address:
        type: string
      area_m2:
        type: integer
      city:
        type: string
      country:
        type: string
      floor:
        type: integer
      pets_allowed:
        type: boolean
      price:
        type: integer
      price_unit:
        description: '"pernight", "permonth"'
        type: string
      rooms:
        type: integer
      status:
        description: '"active", "archived", "blocked"'
        type: string
      title:
        type: string
      total_floors:
        type: integer
    type: object
  internal_handler_auth.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_handler_user.CreateUserRequest:
    properties:
      email:
        type: string
      firstname:
        type: string
      isadmin:
        type: boolean
      islandlord:
        type: boolean
      lastname:
        type: string
      password:
        type: string
    type: object
  internal_handler_user.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_handler_user.ResetPasswordRequest:
    properties:
      password:
        type: string
    type: object
  internal_handler_user.UpdateUserRequest:
    properties:
      email:
        type: string
      firstname:
        type: string
      isadmin:
        type: boolean
      islandlord:
        type: boolean
      lastname:
        type: string
    type: object
  rent-app_internal_domain_apartment.Apartment:
    properties:
      address:
        type: string
      areaM2:
        type: integer
      city:
        type: string
      country:
        type: string
      createdAt:
        type: string
      floor:
        description: указатель на случай если сдается дом
        type: integer
      id:
        type: integer
      ownerID:
        type: integer
      petsAllowed:
        type: boolean
      price:
        type: integer
      priceUnit:
        allOf:
        - $ref: '#/definitions/rent-app_internal_domain_apartment.PriceUnit'
        description: per night or per month
      rooms:
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/rent-app_internal_domain_apartment.ApartmentStatus'
        description: active, archived or blocked
      title:
        type: string
      totalFloors:
        type: integer
      updatedAt:
        type: string
    type: object
  rent-app_internal_domain_apartment.ApartmentStatus:
    enum:
    - active
    - archived
    - blocked
    type: string
    x-enum-varnames:
    - StatusActive
    - StatusArchived
    - StatusBlocked
  rent-app_internal_domain_apartment.PriceUnit:
    enum:
    - pernight
    - permonth
    type: string
    x-enum-varnames:
    - PerNight
    - PerMonth
  rent-app_internal_domain_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  rent-app_internal_domain_auth.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      user:
        properties:
          email:
            type: string
          firstname:
            type: string
          id:
            type: integer
          isadmin:
            type: boolean
          islandlord:
            type: boolean
          lastname:
            type: string
        type: object
    type: object
  rent-app_internal_domain_auth.TokenPair:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
    type: object
  rent-app_internal_domain_user.User:
    properties:
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      id:
        type: integer
      isAdmin:
        type: boolean
      isLandlord:
        type: boolean
      lastName:
        type: string
      passwordHash:
        type: string
      updatedAt:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: genda5656@gmail.com
    name: Yuri Oschepkov
  description: API для управления арендой квартир
  license:
    name: MIT License
    url: https://mit-license.org/
  termsOfService: http://swagger.io/terms/
  title: Rent App API
  version: "1.0"
paths:
  /api/apartments:
    get:
      description: Получение списка всех квартир с возможностью фильтрации. Доступно
        для всех аутентифицированных пользователей.
      parameters:
      - description: Фильтр по стране
        in: query
        name: country
        type: string
      - description: Фильтр по городу
        in: query
        name: city
        type: string
      - description: Минимальная площадь (м²)
        in: query
        name: min_area_m2
        type: integer
      - description: Максимальная площадь (м²)
        in: query
        name: max_area_m2
        type: integer
      - description: Количество комнат
        in: query
        name: rooms
        type: integer
      - description: Этаж
        in: query
        name: floor
        type: integer
      - description: Разрешены ли животные
        in: query
        name: pets_allowed
        type: boolean
      - description: Минимальная цена
        in: query
        name: min_price
        type: integer
      - description: Максимальная цена
        in: query
        name: max_price
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/rent-app_internal_domain_apartment.Apartment'
            type: array
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получение всех квартир
      tags:
      - apartments
    post:
      consumes:
      - application/json
      description: 'Создание новой квартиры. Доступно только для арендодателей и администраторов.
        Допустимые status: "active", "archived", "blocked". Допустимые price unit:
        "pernight", "permonth". Floor не может быть больше Totatfloors. Если установлен
        TotalFloors, Floor должен быть установлен, и наоборот. Все численные значения
        должны быть больше либо равны нулю.'
      parameters:
      - description: Данные квартиры
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_apartment.CreateApartmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/rent-app_internal_domain_apartment.Apartment'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "403":
          description: Доступ запрещен
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создание квартиры
      tags:
      - apartments
  /api/apartments/{id}:
    delete:
      description: Удаление квартиры. Владелец может удалять только свои квартиры,
        администратор может удалять любые.
      parameters:
      - description: ID квартиры
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Квартира успешно удалена
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "403":
          description: Доступ запрещен
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "404":
          description: Квартира не найдена
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удаление квартиры
      tags:
      - apartments
    get:
      description: Получение информации о квартире по ID. Доступно для всех аутентифицированных
        пользователей.
      parameters:
      - description: ID квартиры
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rent-app_internal_domain_apartment.Apartment'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "404":
          description: Квартира не найдена
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получение квартиры по ID
      tags:
      - apartments
    put:
      consumes:
      - application/json
      description: 'Обновление данных квартиры. Владелец может обновлять только свои
        квартиры, администратор может обновлять любые. Допустимые status: "active",
        "archived", "blocked". Допустимые price unit: "pernight", "permonth". Floor
        не может быть больше Totatfloors. Если установлен TotalFloors, Floor должен
        быть установлен, и наоборот. Все численные значения должны быть больше либо
        равны нулю.'
      parameters:
      - description: ID квартиры
        in: path
        name: id
        required: true
        type: integer
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_apartment.UpdateApartmentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rent-app_internal_domain_apartment.Apartment'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "403":
          description: Доступ запрещен
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "404":
          description: Квартира не найдена
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновление квартиры
      tags:
      - apartments
  /api/apartments/owner/{ownerID}:
    get:
      description: Получение списка квартир по ID владельца. Доступно для всех аутентифицированных
        пользователей.
      parameters:
      - description: ID владельца
        in: path
        name: ownerID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/rent-app_internal_domain_apartment.Apartment'
            type: array
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_apartment.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получение квартир по ID владельца
      tags:
      - apartments
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Аутентификация пользователя и выдача JWT токенов (access и refresh)
      parameters:
      - description: Данные для входа
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rent-app_internal_domain_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rent-app_internal_domain_auth.LoginResponse'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_auth.ErrorResponse'
        "401":
          description: Неверные учетные данные
          schema:
            $ref: '#/definitions/internal_handler_auth.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handler_auth.ErrorResponse'
      summary: Вход в систему
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Обновление access токена с помощью refresh токена
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rent-app_internal_domain_auth.TokenPair'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_auth.ErrorResponse'
        "401":
          description: Неверный или истекший токен
          schema:
            $ref: '#/definitions/internal_handler_auth.ErrorResponse'
      summary: Обновление токена
      tags:
      - auth
  /api/users:
    get:
      description: Получение списка всех пользователей. Требуются права администратора.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/rent-app_internal_domain_user.User'
            type: array
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "403":
          description: Требуются права администратора
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получение всех пользователей
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Создание нового пользователя. Доступно без аутентификации, но только
        админы могут создавать других админов.
      parameters:
      - description: Данные пользователя
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_user.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/rent-app_internal_domain_user.User'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "409":
          description: Email уже занят
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
      summary: Создание пользователя
      tags:
      - users
  /api/users/{id}:
    delete:
      description: Удаление пользователя. Обычные пользователи могут удалить только
        свой аккаунт.
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Пользователь успешно удален
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "403":
          description: Доступ запрещен
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удаление пользователя
      tags:
      - users
    get:
      description: Получение информации о пользователе по ID. Требуются права администратора.
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rent-app_internal_domain_user.User'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "403":
          description: Требуются права администратора
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получение пользователя по ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Обновление данных пользователя. Обычные пользователи могут обновлять
        только свой профиль.
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_user.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rent-app_internal_domain_user.User'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "403":
          description: Доступ запрещен
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "409":
          description: Email уже занят
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновление пользователя
      tags:
      - users
  /api/users/{id}/reset-password:
    put:
      consumes:
      - application/json
      description: Сброс пароля пользователя. Пользователь может сбросить только свой
        пароль.
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      - description: Новый пароль
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_user.ResetPasswordRequest'
      responses:
        "204":
          description: Пароль успешно изменен
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "403":
          description: Доступ запрещен
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Сброс пароля
      tags:
      - users
  /api/users/email/{email}:
    get:
      description: Получение информации о пользователе по email. Требуются права администратора.
      parameters:
      - description: Email пользователя
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rent-app_internal_domain_user.User'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "401":
          description: Требуется аутентификация
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "403":
          description: Требуются права администратора
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/internal_handler_user.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получение пользователя по email
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
